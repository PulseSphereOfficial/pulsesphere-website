<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseSphere Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#08111f,#000);
color:white;
overflow:hidden;
}

.login-box{
width:380px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(70,215,255,0.15);
text-align:center;
}

.logo{
font-size:42px;
font-weight:900;
margin-bottom:10px;
color:#46d7ff;
text-shadow:0 0 20px #46d7ff;
}

.subtitle{
color:#ccc;
margin-bottom:35px;
}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
outline:none;
border-radius:15px;
background:#111;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:20px;
background:#46d7ff;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(70,215,255,.4);
}

button:hover{
transform:scale(1.03);
}

.bottom{
margin-top:25px;
font-size:14px;
color:#aaa;
}

.bottom a{
color:#46d7ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">PulseSphere</div>

<div class="subtitle">
Connect • Share • Inspire
</div>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<div class="bottom">
Don't have an account?
<a href="#">Create Account</a>
</div>

</div>

</body>
</html>
